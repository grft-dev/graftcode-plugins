name: Service Bus Plugin - Multiplatform CMake Build

on:
  push:
    branches: [ "main" ]
    paths:
      - "servicebus/**"
      - ".github/workflows/servicebus-build.yml"
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
    paths:
      - "servicebus/**"
      - ".github/workflows/servicebus-build.yml"

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64 - MSVC compiler
          - os: windows-latest
            platform: "Windows"
            arch: "x86_64"
            compiler: "msvc"

          # Linux x86_64 - GCC compiler
          - os: ubuntu-22.04
            platform: "Linux"
            arch: "x86_64"
            compiler: "gcc"

          # macOS ARM64 (Apple Silicon M-series) - Apple Clang
          - os: macos-14
            platform: "macOS"
            arch: "arm64"
            compiler: "clang"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git ninja-build pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config

      - name: Verify CMake installation
        run: cmake --version

      - name: Configure CMake (servicebus)
        shell: bash
        working-directory: servicebus
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake"

      - name: Build (servicebus)
        shell: bash
        working-directory: servicebus
        run: cmake --build build --config Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: servicebus-${{ matrix.platform }}-${{ matrix.arch }}
          path: servicebus/build/ServiceBusPlugin/
          if-no-files-found: warn
          retention-days: 30

  # Create GitHub Release with all platform artifacts
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare artifacts for release
        run: |
          mkdir -p release-files
          for dir in artifacts/*/; do
            platform_arch=$(basename "$dir")
            tar -czf "release-files/servicebus-${platform_arch}.tar.gz" -C "$dir" .
          done
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
